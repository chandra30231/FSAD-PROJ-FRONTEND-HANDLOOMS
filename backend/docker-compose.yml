services:
  mysql:
    image: mysql:8.4
    container_name: handloom-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: handloom_marketplace
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - handloom_mysql_data:/var/lib/mysql

volumes:
  handloom_mysql_data:
